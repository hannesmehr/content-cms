<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 48" fill="none">
  <!-- Caravan icon -->
  <g transform="translate(0, 6)">
    <!-- Caravan body -->
    <rect x="4" y="6" width="32" height="22" rx="4" fill="#D97706"/>
    <!-- Roof curve -->
    <path d="M8 6C8 2 14 0 22 0C30 0 36 2 36 6" fill="#D97706"/>
    <!-- Window -->
    <rect x="8" y="10" width="10" height="8" rx="2" fill="white" opacity="0.9"/>
    <!-- Door -->
    <rect x="22" y="10" width="10" height="18" rx="1" fill="white" opacity="0.85"/>
    <!-- Door handle -->
    <circle cx="30" cy="20" r="1" fill="#D97706"/>
    <!-- Wheels -->
    <circle cx="12" cy="30" r="4" fill="#374151"/>
    <circle cx="12" cy="30" r="2" fill="#9CA3AF"/>
    <circle cx="30" cy="30" r="4" fill="#374151"/>
    <circle cx="30" cy="30" r="2" fill="#9CA3AF"/>
    <!-- Hitch -->
    <line x1="36" y1="24" x2="42" y2="24" stroke="#D97706" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="43" cy="24" r="2" fill="#D97706"/>
  </g>

  <!-- Text: wohnwagen -->
  <text x="52" y="22" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#111827" letter-spacing="-0.5">wohnwagen</text>
  <!-- Text: ratgeber.de -->
  <text x="52" y="42" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#111827" letter-spacing="-0.5">ratgeber<tspan fill="#D97706" font-weight="400">.de</tspan></text>
</svg>
